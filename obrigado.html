<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado! - Download do Material</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
      max-width: 480px;
      width: 100%;
      text-align: center;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0f3460, #533483);
      padding: 32px;
      color: #fff;
    }

    .card-header .icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .card-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 15px;
      opacity: 0.85;
      line-height: 1.5;
    }

    .card-body {
      padding: 40px 32px;
    }

    .card-body p {
      font-size: 15px;
      color: #555;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn-download {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #0f3460, #533483);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      transition: transform 0.15s, box-shadow 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(83, 52, 131, 0.4);
    }

    .footer {
      padding: 0 32px 24px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="icon">&#10004;&#65039;</div>
      <h1>Dados Recebidos com Sucesso!</h1>
      <p>Obrigado por se cadastrar.</p>
    </div>

    <div class="card-body">
      <p>Clique no bot&atilde;o abaixo para fazer o download do material exclusivo.</p>

      <!-- SUBSTITUA O LINK ABAIXO PELO LINK DO SEU ARQUIVO -->
      <a href="COLE_AQUI_O_LINK_DO_ARQUIVO" class="btn-download" download>
        &#128229; Baixar Material
      </a>
    </div>

    <div class="footer">
      Advogando &copy; 2026
    </div>
  </div>

</body>
</html>
