<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Exclusivo para Advogados</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0f3460, #533483);
      padding: 32px 32px 28px;
      text-align: center;
      color: #fff;
    }

    .card-header .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.5;
    }

    .card-body {
      padding: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #533483;
      box-shadow: 0 0 0 3px rgba(83, 52, 131, 0.15);
    }

    input::placeholder {
      color: #aaa;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0f3460, #533483);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(83, 52, 131, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .privacy {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #999;
    }

    .footer {
      text-align: center;
      padding: 0 32px 24px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="icon">&#9878;</div>
      <h1>Material Exclusivo para Advogados</h1>
      <p>Preencha seus dados abaixo para receber acesso imediato ao material gratuito.</p>
    </div>

    <div class="card-body">
      <form
        action="https://formsubmit.co/renanmenesesfb@gmail.com"
        method="POST"
      >
        <!-- FormSubmit config -->
        <input type="hidden" name="_next" value="COLE_AQUI_A_URL_DA_PAGINA_DE_OBRIGADO">
        <input type="hidden" name="_subject" value="Novo Lead - Captura Advogando">
        <input type="hidden" name="_captcha" value="true">
        <input type="hidden" name="_template" value="table">
        <input type="text" name="_honey" style="display:none">

        <div class="form-group">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" name="Nome" placeholder="Seu nome completo" required>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="Email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label for="whatsapp">WhatsApp</label>
          <input type="tel" id="whatsapp" name="WhatsApp" placeholder="(00) 00000-0000" required
            pattern="\(?\d{2}\)?\s?\d{4,5}-?\d{4}"
            title="Formato: (00) 00000-0000">
        </div>

        <div class="form-group">
          <label for="oab">N&uacute;mero da OAB</label>
          <input type="text" id="oab" name="OAB" placeholder="Ex: 123456/SP" required>
        </div>

        <button type="submit" class="btn-submit">Quero Receber o Material</button>

        <p class="privacy">&#128274; Seus dados est&atilde;o seguros e n&atilde;o ser&atilde;o compartilhados.</p>
      </form>
    </div>

    <div class="footer">
      Advogando &copy; 2026
    </div>
  </div>

  <script>
    // Máscara simples para WhatsApp
    document.getElementById('whatsapp').addEventListener('input', function (e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 6) {
        v = '(' + v.slice(0, 2) + ') ' + v.slice(2, 7) + '-' + v.slice(7);
      } else if (v.length > 2) {
        v = '(' + v.slice(0, 2) + ') ' + v.slice(2);
      } else if (v.length > 0) {
        v = '(' + v;
      }
      e.target.value = v;
    });
  </script>

</body>
</html>
